services:
  - type: web
    name: helpdeskflow
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install && npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: |
      php artisan migrate --force
      apache2-foreground
    envVars:
      - key: APP_NAME
        value: HelpDeskFlow
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: helpdeskflow-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: helpdeskflow-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: helpdeskflow-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: helpdeskflow-db
          property: username
      - key: DB_PASSWORD
        fromDatabase:
          name: helpdeskflow-db
          property: password

databases:
  - name: helpdeskflow-db
    plan: free
    type: postgresql
